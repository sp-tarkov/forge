name: Quality Checks

on: [ push, pull_request ]

permissions:
  contents: read

env:
  COMPOSER_AUTH: '{"http-basic": {"composer.fluxui.dev": {"username": "${{ secrets.FLUX_USERNAME }}", "password": "${{ secrets.FLUX_LICENSE_KEY }}"}}}'

jobs:
  composer-psr:
    name: Check Namespaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: ./.github/action/php
        with:
          php-version: 8.5

      - name: Install Composer Dependencies
        run: composer install -q --no-interaction --no-progress --prefer-dist

      - name: Check PSR-4 Mapping
        run: composer dump-autoload --dev --optimize --strict-psr

  composer-validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: ./.github/action/php
        with:
          php-version: 8.5

      - name: Validate composer.json
        run: composer validate --strict

  pint:
    name: Code Style
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: ./.github/action/php
        with:
          php-version: 8.5

      - name: Install Composer Dependencies
        run: composer install -q --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: ./.github/action/node

      - name: Install NPM Dependencies
        run: npm ci

      - name: Run Formatter
        run: npm run lint

      - name: Pint Cache
        uses: actions/cache@v5
        with:
          path: .pint.cache
          key: ${{ runner.os }}-pint-${{ hashFiles('pint.json', 'composer.lock') }}-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-pint-${{ hashFiles('pint.json', 'composer.lock') }}-

      - name: Run Pint
        run: ./vendor/bin/pint --cache-file=.pint.cache

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: automatic fixes"
          commit_user_name: Refringe
          commit_user_email: me@refringe.com
          commit_author: Refringe <me@refringe.com>

  rector:
    name: Code Modernization
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: ./.github/action/php
        with:
          php-version: 8.5

      - name: Install Composer Dependencies
        run: composer install -q --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Rector Cache
        uses: actions/cache@v5
        with:
          path: .rector/cache
          key: ${{ runner.os }}-rector-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-rector-

      - run: mkdir -p .rector/cache

      - name: Execute Rector Analysis
        run: php vendor/bin/rector process --config=rector.php

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "refactor: automatic fixes"
          commit_user_name: Refringe
          commit_user_email: me@refringe.com
          commit_author: Refringe <me@refringe.com>

  phpstan:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: ./.github/action/php
        with:
          php-version: 8.5

      - name: Install Composer Dependencies
        run: composer install -q --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: PHPStan Cache
        uses: actions/cache@v5
        with:
          path: /tmp/phpstan
          key: ${{ runner.os }}-phpstan-${{ hashFiles('phpstan.neon') }}-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-phpstan-${{ hashFiles('phpstan.neon') }}-

      - name: Execute PHPStan Analysis
        run: php vendor/bin/phpstan analyse --no-progress

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: The PHP Security Checker
        uses: symfonycorp/security-checker-action@v5

  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Search For Misspellings
        uses: crate-ci/typos@v1
        with:
          config: ./typos.toml
