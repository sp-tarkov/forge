name: Tests

on: [ push, pull_request ]

permissions:
  contents: read

env:
  COMPOSER_AUTH: '{"http-basic": {"composer.fluxui.dev": {"username": "${{ secrets.FLUX_USERNAME }}", "password": "${{ secrets.FLUX_LICENSE_KEY }}"}}}'

jobs:
  tests:
    runs-on: ubuntu-latest

    name: Tests (Shard ${{ matrix.shard }}/6)

    strategy:
      fail-fast: false
      matrix:
        shard: [ 1, 2, 3, 4, 5, 6 ]

    services:
      mysql:
        image: mysql:8.3
        ports:
          - 33306:3306
        env:
          MYSQL_DATABASE: test
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/action/setup
        with:
          php-version: 8.5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Composer Dependencies
        run: composer install -q --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Install NPM dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Prepare Laravel Environment
        run: |
          php -r "file_exists('.env') || copy('.env.ci', '.env');"
          php artisan key:generate
          php artisan passport:keys --force
          php artisan optimize

      - name: Build Front-end Assets
        run: npm run build

      - name: Start Reverb Server
        run: php artisan reverb:start --host=127.0.0.1 --port=8080 &

      - name: Run Database Migrations
        run: php artisan migrate

      - name: Link Storage
        run: php artisan storage:link

      - name: Run Tests
        run: ./vendor/bin/pest --ci --parallel --shard=${{ matrix.shard }}/6

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: screenshots-shard-${{ matrix.shard }}
          path: tests/Browser/screenshots

      - name: Display Laravel Log
        if: failure()
        run: cat storage/logs/laravel.log

  tests-complete:
    runs-on: ubuntu-latest

    name: Tests Complete

    needs: tests

    if: ${{ always() }}

    steps:
      - name: Verify All Shards Passed
        if: ${{ needs.tests.result != 'success' }}
        run: |
          echo "One or more test shards did not pass: ${{ needs.tests.result }}"
          exit 1

  type-coverage:
    runs-on: ubuntu-latest

    name: Type Coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/action/setup
        with:
          php-version: 8.5

      - name: Install Composer Dependencies
        run: composer install -q --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Prepare Laravel Environment
        run: |
          php -r "file_exists('.env') || copy('.env.ci', '.env');"
          php artisan key:generate
          php artisan optimize

      - name: Run Type Coverage
        env:
          FORK_MEM_PER_PROC: "1099511627776" # 1 TiB per-process budget forces Pokio to one fork worker on any runner.
        run: ./vendor/bin/pest --type-coverage --min=100

      - name: Display Laravel Log
        if: failure()
        run: cat storage/logs/laravel.log
